function pickVerb(pred, subjPlural){
  if(pred.modal) return pred.verb_plur || pred.verb_sing || '';
  return subjPlural ? (pred.verb_plur || '') : (pred.verb_sing || '');
}

function mintCross(){
  let subj, pred, tries = 0;
  do {
    subj = randItem(SUBJECTS);
    pred = randItem(PREDICATES);
    tries++;
  } while((subj.id === pred.id || crossIsDefamatory(subj, pred)) && tries < 50);
  // Reject same-origin crosses and defamatory crosses (person + accusation).
  if(subj.id === pred.id || crossIsDefamatory(subj, pred)) return null;

  const verb = pickVerb(pred, subj.plural);
  const pieces = [subj.text];
  if(pred.modal) pieces.push(pred.modal);
  if(verb)       pieces.push(verb);
  if(pred.rest)  pieces.push(pred.rest);
  let headline = pieces.join(' ');
  if(headline) headline = headline.charAt(0).toUpperCase() + headline.slice(1);

  return {
    headline:      headline,
    subject_src:   subj.src,
    subject_orig:  subj.orig,
    subject_link:  subj.link,
    predicate_src: pred.src,
    predicate_orig:pred.orig,
    predicate_link:pred.link
  };
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function makeBatch(n){
  if(!HAVE_PARTS){
    return shuffle(LEGACY).slice(0, n);
  }
  const out = [];
  let guard = 0;
  while(out.length < n && guard < n*20){
    const c = mintCross();
    if(c && c.headline) out.push(c);
    guard++;
  }
  return out;
}

let lastBatch = [];

function generate(){
  const items = makeBatch(20);
  const list = document.getElementById('list');
  if(!items.length){
    list.innerHTML = '<div class="card"><div class="card-headline">No headlines available yet!</div></div>';
    lastBatch = [];
    return;
  }
  let html = '';
  lastBatch = [];
  items.forEach((h,idx)=>{
    const i = idx+1;
    lastBatch.push(i + '. ' + h.headline +
      '\n   [subject: ' + (h.subject_orig||'') + ']' +
      '\n   [predicate: ' + (h.predicate_orig||'') + ']');
    html +=
      '<div class="card">'+
        '<div class="card-num">#'+i+'</div>'+
        '<div class="card-headline">'+escapeHtml(h.headline)+'</div>'+
        '<div class="card-sources">'+
          '<div><span class="source-label">Subject from:</span> '+escapeHtml(h.subject_src||'')+
            ' <small>\u2014 '+sourceLink(h.subject_orig, h.subject_link)+'</small></div>'+
          '<div><span class="source-label">Predicate from:</span> '+escapeHtml(h.predicate_src||'')+
            ' <small>\u2014 '+sourceLink(h.predicate_orig, h.predicate_link)+'</small></div>'+
        '</div>'+
      '</div>';
  });
  list.innerHTML = html;
}

function refreshStats(){
  const stats = document.getElementById('stats');
  if(HAVE_PARTS){
    const combos = SUBJECTS.length * PREDICATES.length;
    stats.textContent =
      SUBJECTS.length + ' subjects \u00D7 ' + PREDICATES.length + ' predicates \u2248 ' +
      combos.toLocaleString() + ' possible headlines \u2014 shuffling 20 at a time';
  } else {
    stats.textContent = LEGACY.length + ' recombined headlines \u2014 showing 20 at random';
  }
}

document.getElementById('gen').addEventListener('click', generate);
document.getElementById('copy').addEventListener('click',()=>{
  if(!lastBatch.length){ alert('Show headlines first!'); return; }
  navigator.clipboard.writeText(lastBatch.join('\n\n')).then(()=>alert('All 20 copied (with sources)!'));
});

if(data.metadata && data.metadata.generated_at){
  document.getElementById('freshness').textContent =
    'Parts refreshed: '+ new Date(data.metadata.generated_at+'Z').toLocaleString();
}
refreshStats();
generate();
</script>
