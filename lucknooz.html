<script>
/* ---- Display finished headlines -----------------------------------------
   The generator (Claude) already produced complete recombined headlines and
   stored them in data.headlines. The browser does NO assembly — it just
   shuffles the pool and shows 20 at a time, each with its two source
   headlines. */

const data = JSON.parse(document.getElementById('data').textContent);
const ALL = data.headlines || [];

function escapeHtml(str){
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* Render the COMPLETE source headline. If we captured the article URL, make it
   a link that opens the real story in a new tab (so LuckNooz stays open behind
   it); otherwise show the full text as plain quoted text. */
function sourceLink(text, url){
  const full = '“'+escapeHtml(text||'')+'”';
  if(url && /^https?:\/\//i.test(url)){
    return '<a href="'+escapeHtml(url)+'" target="_blank" rel="noopener noreferrer">'+full+'</a>';
  }
  return full;
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function pool(){
  return ALL;
}

let lastBatch = [];

function generate(){
  const items = shuffle(pool()).slice(0,20);
  const list = document.getElementById('list');
  if(!items.length){
    list.innerHTML = '<div class="card"><div class="card-headline">No headlines for this category yet!</div></div>';
    lastBatch = [];
    return;
  }
  let html = '';
  lastBatch = [];
  items.forEach((h,idx)=>{
    const i = idx+1;
    lastBatch.push(i + '. ' + h.headline +
      '\n   [subject: ' + (h.subject_orig||'') + ']' +
      '\n   [predicate: ' + (h.predicate_orig||'') + ']');
    html +=
      '<div class="card">'+
        '<div class="card-num">#'+i+'</div>'+
        '<div class="card-headline">'+escapeHtml(h.headline)+'</div>'+
        '<div class="card-sources">'+
          '<div><span class="source-label">Subject from:</span> '+escapeHtml(h.subject_src||'')+
            ' <small>— '+sourceLink(h.subject_orig, h.subject_link)+'</small></div>'+
          '<div><span class="source-label">Predicate from:</span> '+escapeHtml(h.predicate_src||'')+
            ' <small>— '+sourceLink(h.predicate_orig, h.predicate_link)+'</small></div>'+
        '</div>'+
      '</div>';
  });
  list.innerHTML = html;
}

function refreshStats(){
  document.getElementById('stats').textContent =
    pool().length + ' recombined headlines — showing 20 at random';
}

document.getElementById('gen').addEventListener('click', generate);
document.getElementById('copy').addEventListener('click',()=>{
  if(!lastBatch.length){ alert('Show headlines first!'); return; }
  navigator.clipboard.writeText(lastBatch.join('\n\n')).then(()=>alert('All 20 copied (with sources)!'));
});

if(data.metadata && data.metadata.generated_at){
  document.getElementById('freshness').textContent =
    'Headlines refreshed: '+ new Date(data.metadata.generated_at+'Z').toLocaleString();
}
refreshStats();
generate();
</script>
